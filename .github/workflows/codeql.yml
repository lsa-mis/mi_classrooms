name: CodeQL

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Ruby)
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Reduce CodeQL action download contention
        shell: bash
        run: |
          sleep $((RANDOM % 60))

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.4
        with:
          languages: ruby

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.7"
          bundler-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips libvips-tools

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.35.4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.35.4
