name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint_and_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.7"
          bundler-cache: true

      - name: Prepare databases
        run: bundle exec rails db:prepare

      - name: Brakeman
        run: bundle exec brakeman -q -w2 --no-pager

      - name: Standard Ruby
        run: bundle exec standardrb

      - name: Show test schema details
        run: |
          bundle exec rails runner 'puts ActiveRecord::Base.connection.columns(:rooms).map { |c| [c.name, c.sql_type].join(": ") }'

      - name: RSpec
        run: bundle exec rspec

      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: log/test.log
