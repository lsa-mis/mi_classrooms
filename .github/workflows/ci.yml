name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint_and_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      ENABLE_TEST_LOGIN: "true"
      TEST_LOGIN_TOKEN: "secret-token"
      TEST_LOGIN_EMAIL: "test.login@umich.edu"

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.7"
          bundler-cache: true

      - name: Show versions
        run: |
          ruby -v
          bundle -v
          bundle exec rails -v
          psql --version

      - name: Prepare databases
        run: |
          bundle exec rails db:drop db:create db:schema:load

      - name: Show test schema details
        run: |
          bundle exec rails runner 'puts ActiveRecord::Base.connection.columns(:rooms).map { |c| [c.name, c.sql_type].join(": ") }'

      - name: Brakeman
        run: bundle exec brakeman -q -w2 --no-pager

      - name: Standard Ruby
        run: bundle exec standardrb

      - name: RSpec
        run: bundle exec rspec --format documentation --backtrace

      - name: Show test log on failure
        if: failure()
        run: |
          echo "===== log/test.log ====="
          tail -n 300 log/test.log || true

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: log/test.log

      - name: Show test login env
        run: |
          bundle exec rails runner 'puts "ENABLE_TEST_LOGIN=#{ENV["ENABLE_TEST_LOGIN"].inspect}"; puts "TEST_LOGIN_TOKEN present? #{ENV["TEST_LOGIN_TOKEN"].present?}"'
